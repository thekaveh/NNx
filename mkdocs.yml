site_name: nnx
site_description: Lightweight PyTorch training / eval / visualization toolkit
site_url: https://thekaveh.github.io/NNx/
repo_url: https://github.com/thekaveh/NNx
repo_name: thekaveh/NNx

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts: concepts.md
  - Model surgery: surgery.md
  - HuggingFace Hub: hub.md
  - Embeddings: embeddings.md
  - Language modeling: lm.md
  - I-JEPA: jepa.md
  - API Reference: api.md

# Working design docs aren't user-facing — exclude them from the
# published site. Local-only spec files under docs/specs/ shouldn't break
# `mkdocs build --strict` if one ever lands accidentally.
exclude_docs: |
  superpowers/
  specs/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
