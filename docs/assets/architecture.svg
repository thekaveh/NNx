<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 880" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c" />
    </marker>
    <marker id="arrowhead-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#020617"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- ARROWS (drawn first so component boxes paint over them) -->
  <line x1="180" y1="115" x2="238" y2="115" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="180" y1="215" x2="238" y2="215" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="115" x2="478" y2="115" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
  <line x1="420" y1="215" x2="478" y2="215" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
  <line x1="600" y1="115" x2="658" y2="115" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead-amber)"/>
  <line x1="600" y1="215" x2="658" y2="215" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead-amber)"/>
  <line x1="330" y1="160" x2="330" y2="338" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="478" y1="365" x2="538" y2="365" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="365" x2="760" y2="365" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="920" y1="365" x2="980" y2="365" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="395" x2="380" y2="478" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
  <text x="392" y="442" fill="#fb923c" font-size="9">on_*_begin/end</text>
  <line x1="300" y1="510" x2="300" y2="568" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
  <line x1="495" y1="510" x2="495" y2="568" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
  <line x1="690" y1="510" x2="690" y2="568" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
  <line x1="885" y1="510" x2="885" y2="568" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
  <line x1="1080" y1="510" x2="1080" y2="568" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrowhead-orange)"/>
  <line x1="1060" y1="395" x2="1060" y2="678" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead-violet)"/>
  <text x="1068" y="525" fill="#a78bfa" font-size="9">writes</text>
  <path d="M 340 395 Q 340 580 340 678" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead-violet)"/>
  <text x="288" y="525" fill="#a78bfa" font-size="9">writes</text>
  <line x1="470" y1="745" x2="640" y2="745" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead-violet)"/>
  <line x1="1010" y1="745" x2="878" y2="745" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead-violet)"/>

  <!-- BOUNDARIES -->
  <rect x="220" y="40" width="940" height="820" rx="12" fill="rgba(251,191,36,0.04)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="232" y="58" fill="#fbbf24" font-size="10" font-weight="600">nnx package — pip install nnx</text>
  <rect x="658" y="70" width="492" height="180" rx="8" fill="rgba(120,53,15,0.05)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="668" y="86" fill="#fbbf24" font-size="9" font-weight="600">Specialization subpackages</text>
  <rect x="220" y="660" width="920" height="180" rx="8" fill="rgba(76,29,149,0.05)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="232" y="678" fill="#a78bfa" font-size="9" font-weight="600">Persistence (runs/&lt;id&gt;/ on disk)</text>

  <!-- LAYER 1: User code (slate) -->
  <rect x="60" y="90" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="60" y="90" width="120" height="50" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="120" y="110" fill="white" font-size="11" font-weight="600" text-anchor="middle">User Code</text>
  <text x="120" y="126" fill="#94a3b8" font-size="9" text-anchor="middle">import nnx</text>
  <rect x="60" y="190" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="60" y="190" width="120" height="50" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="120" y="210" fill="white" font-size="11" font-weight="600" text-anchor="middle">PyTorch</text>
  <text x="120" y="226" fill="#94a3b8" font-size="9" text-anchor="middle">nn.Module / Tensor</text>

  <!-- LAYER 2: Public entry surface (cyan) -->
  <rect x="240" y="90" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="240" y="90" width="180" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="330" y="110" fill="white" font-size="12" font-weight="600" text-anchor="middle">NNModel</text>
  <text x="330" y="126" fill="#94a3b8" font-size="9" text-anchor="middle">net + params + .train()</text>
  <rect x="240" y="190" width="180" height="50" rx="6" fill="#0f172a"/>
  <rect x="240" y="190" width="180" height="50" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="330" y="210" fill="white" font-size="12" font-weight="600" text-anchor="middle">Trainer</text>
  <text x="330" y="226" fill="#94a3b8" font-size="9" text-anchor="middle">multi-optim — GAN, A2C</text>

  <!-- LAYER 3: step_fn hook bus (orange) -->
  <rect x="480" y="90" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="480" y="90" width="120" height="50" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="540" y="110" fill="white" font-size="11" font-weight="600" text-anchor="middle">train_step_fn</text>
  <text x="540" y="126" fill="#fb923c" font-size="9" text-anchor="middle">hook (optional)</text>
  <rect x="480" y="190" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="480" y="190" width="120" height="50" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="540" y="210" fill="white" font-size="11" font-weight="600" text-anchor="middle">trainer_step_fn</text>
  <text x="540" y="226" fill="#fb923c" font-size="9" text-anchor="middle">hook (required)</text>

  <!-- LAYER 4: Specializations (amber) -->
  <!-- Tier 1 (foundational): finetune, peft, diffusion, paradigms, trainer + shared _step_helpers -->
  <rect x="660" y="100" width="150" height="50" rx="6" fill="#0f172a"/>
  <rect x="660" y="100" width="150" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="735" y="120" fill="white" font-size="11" font-weight="600" text-anchor="middle">nnx.finetune</text>
  <text x="735" y="136" fill="#94a3b8" font-size="9" text-anchor="middle">freeze, load_pretrained</text>
  <rect x="830" y="100" width="150" height="50" rx="6" fill="#0f172a"/>
  <rect x="830" y="100" width="150" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="905" y="120" fill="white" font-size="11" font-weight="600" text-anchor="middle">nnx.peft</text>
  <text x="905" y="136" fill="#94a3b8" font-size="9" text-anchor="middle">LoRA / DoRA / IA3 / Prefix / Prompt</text>
  <rect x="1000" y="100" width="140" height="50" rx="6" fill="#0f172a"/>
  <rect x="1000" y="100" width="140" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1070" y="120" fill="white" font-size="11" font-weight="600" text-anchor="middle">nnx.diffusion</text>
  <text x="1070" y="136" fill="#94a3b8" font-size="9" text-anchor="middle">DDPM, sample()</text>
  <rect x="660" y="190" width="150" height="50" rx="6" fill="#0f172a"/>
  <rect x="660" y="190" width="150" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="735" y="210" fill="white" font-size="11" font-weight="600" text-anchor="middle">nnx.paradigms</text>
  <text x="735" y="226" fill="#94a3b8" font-size="9" text-anchor="middle">KD / SimCLR / MoE / JEPA / DPO</text>
  <rect x="830" y="190" width="150" height="50" rx="6" fill="#0f172a"/>
  <rect x="830" y="190" width="150" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="905" y="210" fill="white" font-size="11" font-weight="600" text-anchor="middle">nnx.trainer</text>
  <text x="905" y="226" fill="#94a3b8" font-size="9" text-anchor="middle">Trainer class</text>
  <rect x="1000" y="190" width="140" height="50" rx="6" fill="#0f172a"/>
  <rect x="1000" y="190" width="140" height="50" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1070" y="210" fill="white" font-size="11" font-weight="600" text-anchor="middle">_step_helpers</text>
  <text x="1070" y="226" fill="#94a3b8" font-size="9" text-anchor="middle">finalize_step()</text>

  <!-- Tier 2 (post-megamerge): model ops + interop + downstream — listed as a single
       annotation row to avoid forcing a viewBox reflow. The api.md / concepts.md §15
       index documents each individually. -->
  <text x="668" y="262" fill="#fbbf24" font-size="9" font-weight="600">Plus:</text>
  <text x="700" y="262" fill="#fde68a" font-size="9">nnx.quantize (PTQ / QAT)  •  nnx.prune (magnitude / 2:4)  •  nnx.surgery (Net2Net / drop / low-rank)  •</text>
  <text x="700" y="276" fill="#fde68a" font-size="9">nnx.embeddings (contrastive + FAISS)  •  nnx.interop (GGUF / Ollama / safetensors)  •  nnx.generation (LogitsProcessor)  •  nnx.viz (model-internals)</text>

  <!-- LAYER 5: Training loop internals (emerald) -->
  <rect x="260" y="338" width="220" height="60" rx="6" fill="#0f172a"/>
  <rect x="260" y="338" width="220" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="370" y="362" fill="white" font-size="12" font-weight="600" text-anchor="middle">Training Loop</text>
  <text x="370" y="380" fill="#94a3b8" font-size="9" text-anchor="middle">epoch × batch dispatch</text>
  <rect x="540" y="338" width="160" height="60" rx="6" fill="#0f172a"/>
  <rect x="540" y="338" width="160" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="620" y="362" fill="white" font-size="11" font-weight="600" text-anchor="middle">NaN + grad-clip</text>
  <text x="620" y="380" fill="#94a3b8" font-size="9" text-anchor="middle">inline / _step_helpers</text>
  <rect x="760" y="338" width="160" height="60" rx="6" fill="#0f172a"/>
  <rect x="760" y="338" width="160" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="840" y="362" fill="white" font-size="11" font-weight="600" text-anchor="middle">_step_scheduler</text>
  <text x="840" y="380" fill="#94a3b8" font-size="9" text-anchor="middle">Schedulers enum</text>
  <rect x="980" y="338" width="160" height="60" rx="6" fill="#0f172a"/>
  <rect x="980" y="338" width="160" height="60" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1060" y="362" fill="white" font-size="11" font-weight="600" text-anchor="middle">_save_checkpoints</text>
  <text x="1060" y="380" fill="#94a3b8" font-size="9" text-anchor="middle">FIRST/Q1/Q2/Q3/LAST/BEST</text>

  <!-- LAYER 6: Callback bus (kept inside the nnx package boundary) -->
  <rect x="240" y="478" width="900" height="32" rx="6" fill="#0f172a"/>
  <rect x="240" y="478" width="900" height="32" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="690" y="498" fill="white" font-size="11" font-weight="600" text-anchor="middle">Callback Bus  •  on_train_begin / on_epoch_begin / on_epoch_end / on_train_end</text>

  <!-- LAYER 7: Callback listeners (orange) — 5 boxes evenly spaced inside the bus -->
  <rect x="240" y="568" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="240" y="568" width="120" height="50" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="300" y="588" fill="white" font-size="11" font-weight="600" text-anchor="middle">EarlyStopping</text>
  <text x="300" y="604" fill="#94a3b8" font-size="9" text-anchor="middle">patience monitor</text>
  <rect x="435" y="568" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="435" y="568" width="120" height="50" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="495" y="588" fill="white" font-size="11" font-weight="600" text-anchor="middle">LRMonitor</text>
  <text x="495" y="604" fill="#94a3b8" font-size="9" text-anchor="middle">LR history</text>
  <rect x="630" y="568" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="630" y="568" width="120" height="50" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="690" y="588" fill="white" font-size="11" font-weight="600" text-anchor="middle">ModelCheckpoint</text>
  <text x="690" y="604" fill="#94a3b8" font-size="9" text-anchor="middle">custom epochs</text>
  <rect x="825" y="568" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="825" y="568" width="120" height="50" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="885" y="588" fill="white" font-size="11" font-weight="600" text-anchor="middle">TensorBoard</text>
  <text x="885" y="604" fill="#94a3b8" font-size="9" text-anchor="middle">opt-in extra</text>
  <rect x="1020" y="568" width="120" height="50" rx="6" fill="#0f172a"/>
  <rect x="1020" y="568" width="120" height="50" rx="6" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="1080" y="588" fill="white" font-size="11" font-weight="600" text-anchor="middle">Wandb</text>
  <text x="1080" y="604" fill="#94a3b8" font-size="9" text-anchor="middle">opt-in extra</text>

  <!-- LAYER 8: Persistence (violet) -->
  <rect x="220" y="700" width="240" height="60" rx="6" fill="#0f172a"/>
  <rect x="220" y="700" width="240" height="60" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="340" y="724" fill="white" font-size="11" font-weight="600" text-anchor="middle">NNRun</text>
  <text x="340" y="742" fill="#94a3b8" font-size="9" text-anchor="middle">run.yaml + idps.csv + metadata.yaml</text>
  <rect x="650" y="700" width="220" height="60" rx="6" fill="#0f172a"/>
  <rect x="650" y="700" width="220" height="60" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="760" y="724" fill="white" font-size="11" font-weight="600" text-anchor="middle">runs/&lt;id&gt;/</text>
  <text x="760" y="742" fill="#94a3b8" font-size="9" text-anchor="middle">md5(state)-keyed directory</text>
  <rect x="1000" y="700" width="120" height="60" rx="6" fill="#0f172a"/>
  <rect x="1000" y="700" width="120" height="60" rx="6" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="1060" y="724" fill="white" font-size="11" font-weight="600" text-anchor="middle">NNCheckpoint</text>
  <text x="1060" y="742" fill="#94a3b8" font-size="9" text-anchor="middle">*.pt + *.opt.pt</text>
</svg>
