# Pre-commit hooks for nnx. Install with:
#   pre-commit install
# Run on all files:
#   pre-commit run --all-files
repos:
  # ruff rev should track the pin in pyproject.toml's [dev] extras —
  # otherwise pre-commit lints under a different rule set than CI / local
  # `ruff` and 96-file format drift accumulates silently.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
