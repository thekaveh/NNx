name: security

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "pyproject.toml"
      - "requirements-tools.txt"
      - "uv.lock"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  pip-audit:
    name: Audit dependencies (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        # actions/checkout@v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        # actions/setup-python@v7.0.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-tools.txt
            uv.lock

      - name: Install pip-audit
        run: |
          python -m pip install -r requirements-tools.txt

      - name: Audit frozen dependency graph
        run: |
          uv export --frozen --all-extras --python "$PYTHON_VERSION" --no-emit-project --no-hashes --output-file frozen-requirements.txt
          python -m pip_audit --requirement frozen-requirements.txt --progress-spinner off
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
