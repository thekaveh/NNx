name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight matrix runs when a new commit lands on the same PR
# (push to main always finishes). Saves runner minutes without
# delaying main-branch CI signal.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Principle of least privilege: CI only needs to read the repo. Override
# at job/step level if a future addition needs more.
permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    # Caps a hung pytest run; default is 6 hours on GitHub-hosted runners.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python ${{ matrix.python-version }}
        # actions/setup-python@v6
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-tools.txt
            uv.lock

      - name: Verify dependency lock
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-tools.txt
          uv lock --check

      - name: Install package (editable + dev + every optional extra)
        # Every optional-dep extra is installed so the tests that gate on
        # `pytest.importorskip(...)` for {hub, viz, viz-interactive,
        # quantize, tensorboard, wandb, onnx, onnx-dynamo, embeddings,
        # lm, gguf-write} actually exercise the code path in CI instead
        # of silently skipping. Without this, a broken import in a new
        # sub-project would ship to PyPI undetected. Keep this list in
        # sync with pyproject.toml [project.optional-dependencies] and
        # with release.yml's install line.
        run: |
          pip install -e ".[dev,docs,hub,viz,viz-interactive,quantize,tensorboard,wandb,onnx,onnx-dynamo,embeddings,lm,gguf-write]"

      - name: Lint with ruff
        run: ruff check src/ tests/ examples/

      - name: Check formatting with ruff
        # Matches the `ruff-format` hook in .pre-commit-config.yaml so
        # contributors running pre-commit don't see CI accepting code
        # that pre-commit would reformat.
        run: ruff format --check src/ tests/ examples/

      - name: Type-check with pyright
        # Advisory only: continue-on-error swallows ERRORS as well as
        # warnings (the repo carries a known advisory baseline, largely
        # from the net: Tensor|Module typing pattern). The step exists to
        # surface the report in CI logs; make it gating once the baseline
        # is burned down. pyright is in [dev] extras so locals reproduce CI.
        run: pyright --warnings
        continue-on-error: true

      - name: Run pytest
        env:
          NNX_TQDM_DISABLE: "1"
        run: |
          if [[ "${{ matrix.python-version }}" == "3.11" ]]; then
            pytest --cov=nnx --cov-report=term-missing --cov-report=xml
          else
            pytest
          fi

      - name: Build docs with mkdocs --strict
        # Surfaces broken cross-doc links and missing nav entries that
        # would otherwise ship to the published site.
        run: mkdocs build --strict --site-dir _site

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        # actions/upload-artifact@v5
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
