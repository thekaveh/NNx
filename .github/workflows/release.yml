name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  workflow_call:
    inputs:
      release_ref:
        required: true
        type: string
      tag_name:
        required: true
        type: string

# Principle of least privilege, matching ci.yml: the workflow default is
# read-only; jobs that need more (id-token for trusted publishing)
# declare it themselves. A future job added without its own permissions
# block inherits this floor instead of the repository default.
permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: run the full test matrix before letting the publish job run.
  # Without this, a tag push on a red branch would still publish to PyPI
  # (versions can be yanked but not deleted — a poisoned release is
  # permanent).
  test:
    name: Test before release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        # actions/checkout@v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ inputs.release_ref || github.ref }}
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        # actions/setup-python@v7.0.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          python -m pip install -r requirements-tools.txt

      - name: Sync package from the frozen lock
        # Match ci.yml — every optional-dep extra is installed for the
        # release gate so the full test surface (including the optional
        # sub-projects that skip without their extras) runs before we
        # publish to PyPI. A poisoned release is permanent (PyPI versions
        # can be yanked but not deleted), so the gate must be thorough.
        run: |
          uv sync --frozen --all-extras --python "$PYTHON_VERSION"
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Lint with ruff
        run: uv run --frozen ruff check src/ tests/ examples/ scripts/

      - name: Check formatting with ruff
        run: uv run --frozen ruff format --check src/ tests/ examples/ scripts/

      - name: Type-check with pyright
        run: uv run --frozen pyright --warnings

      - name: Run pytest
        env:
          NNX_TQDM_DISABLE: "1"
        run: uv run --frozen pytest

      - name: Build docs with mkdocs --strict
        run: uv run --frozen mkdocs build --strict --site-dir _site

  build-and-publish:
    name: Build sdist + wheel and publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Scopes OIDC credentials to a configured GitHub deployment
    # environment named `pypi`. Configure required approvals + branch
    # protection on that environment via repo settings so a misconfigured
    # workflow on a fork or branch can't publish.
    environment:
      name: pypi
      url: https://pypi.org/p/thekaveh-nnx
    permissions:
      # OIDC-based PyPI trusted publishing (no API token in secrets needed).
      # Configure the project on PyPI > Manage > Publishing to opt in.
      id-token: write # Request the PyPI trusted-publishing credential.
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ inputs.release_ref || github.ref }}
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python@v7.0.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install -r requirements-tools.txt

      - name: Assert tag matches pyproject version
        # PyPI uploads are permanent (yank-not-delete), so a typo'd tag
        # (v0.2.1 against a 0.2.0 pyproject) must abort BEFORE publish —
        # verify-published would only catch the mismatch after the
        # irreversible upload. workflow_dispatch dry-runs skip this.
        # Reusable workflows retain the caller's event name, so Release Please
        # calls are identified by their required tag_name input.
        if: inputs.tag_name != '' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        run: |
          tag_version="${RELEASE_TAG#v}"
          py_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag_version" != "$py_version" ]; then
            echo "::error::tag v$tag_version does not match pyproject version $py_version — aborting before publish."
            exit 1
          fi
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}

      - name: Build reproducible sdist + wheel
        run: |
          set -euo pipefail
          epoch="$(git log -1 --pretty=%ct)"
          export SOURCE_DATE_EPOCH="$epoch"
          uv build --out-dir dist-a
          uv build --out-dir dist-b
          python scripts/normalize_sdist.py dist-a/*.tar.gz --epoch "$epoch"
          python scripts/normalize_sdist.py dist-b/*.tar.gz --epoch "$epoch"
          for artifact in dist-a/*; do
            name="$(basename "$artifact")"
            cmp "$artifact" "dist-b/$name"
          done
          mv dist-a dist
          rm -rf dist-b

      - name: Verify built distributions
        # twine check catches the most common metadata issues (missing
        # long_description, invalid RST/MD, malformed classifiers) before
        # uploading. Cheap pre-flight; failure here aborts the publish.
        run: twine check dist/*

      - name: Publish to PyPI
        # Only runs on tag pushes; workflow_dispatch builds without publishing
        # so you can inspect the artifacts before cutting a real release.
        if: inputs.tag_name != '' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        # pypa/gh-action-pypi-publish@v1.14.1
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247

      - name: Upload build artifacts (workflow_dispatch dry-run)
        if: github.event_name == 'workflow_dispatch'
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dist
          path: dist/
          retention-days: 7

  verify-published:
    name: Verify the new version is reachable on PyPI
    needs: build-and-publish
    # Only runs on actual tag-push publishes, not workflow_dispatch dry runs
    # (since the dry-run path skips the pypi-publish step).
    if: inputs.tag_name != '' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Least-privilege: this job only fetches from PyPI + imports nnx.
    # No GITHUB_TOKEN scopes beyond contents:read needed.
    permissions:
      contents: read
    steps:
      - name: Extract version from tag
        id: ver
        run: |
          version="${RELEASE_TAG#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Verifying that thekaveh-nnx==$version is reachable on PyPI..."
        env:
          RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}

      - name: Set up Python
        # No pip cache here — we want fresh resolution to catch PyPI
        # propagation lag honestly. Cache would defeat the purpose.
        # actions/setup-python@v7.0.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'

      - name: Wait for PyPI CDN propagation + install in a fresh venv
        # PyPI's CDN can lag by tens of seconds after a successful upload.
        # Retry up to 5 times with 30s backoff (~2.5min total budget).
        # Each attempt starts from a clean venv to ensure a partial
        # install on attempt N can't mask the regression on attempt N+1.
        run: |
          set -e
          version="$RELEASE_VERSION"
          for attempt in 1 2 3 4 5; do
            rm -rf .verify-venv
            python -m venv .verify-venv
            if .verify-venv/bin/python -m pip install --no-cache-dir "thekaveh-nnx==$version"; then
              echo "✓ pip install succeeded on attempt $attempt"
              exit_code=0
              break
            fi
            exit_code=1
            if [ "$attempt" -eq 5 ]; then
              echo "✗ pip install failed after 5 attempts; PyPI propagation timeout"
              exit 1
            fi
            echo "Attempt $attempt failed (PyPI CDN propagation lag?); waiting 30s..."
            sleep 30
          done
          exit "$exit_code"
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}

      - name: Import + version check
        run: |
          .verify-venv/bin/python - <<'PY'
          import os
          import nnx
          from nnx import ConvNN
          from nnx import FeedFwdMoENN
          from nnx import NNConvParams
          from nnx import NNMoEParams

          expected = os.environ["EXPECTED_VERSION"]
          actual = nnx.__version__
          assert actual == expected, (
              f"version mismatch: nnx.__version__={actual!r} "
              f"but tag was {expected!r}"
          )
          required_apis = (NNMoEParams, NNConvParams, FeedFwdMoENN, ConvNN)
          print(
              f"✓ thekaveh-nnx {actual} live on PyPI with Studio APIs: "
              + ", ".join(symbol.__name__ for symbol in required_apis)
          )
          PY
        env:
          EXPECTED_VERSION: ${{ steps.ver.outputs.version }}
