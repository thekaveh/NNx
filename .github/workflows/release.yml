name: Release

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      release_ref:
        required: true
        type: string
      tag_name:
        required: true
        type: string

# Principle of least privilege, matching ci.yml: the workflow default is
# read-only; jobs that need more (id-token for trusted publishing)
# declare it themselves. A future job added without its own permissions
# block inherits this floor instead of the repository default.
permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  # Gate: run the full test matrix before letting the publish job run.
  # Without this, a release request for a red commit would still publish to PyPI
  # (versions can be yanked but not deleted — a poisoned release is
  # permanent).
  test:
    name: Test before release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        # actions/checkout@v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ inputs.release_ref || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require release commit on main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "::error::release commit must be reachable from protected main"
            exit 1
          }

      - name: Set up Python ${{ matrix.python-version }}
        # actions/setup-python@v7.0.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        # astral-sh/setup-uv@v7.6.0
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: false
          version: "0.11.31"

      - name: Sync package from the frozen lock
        # Match ci.yml — every optional-dep extra is installed for the
        # release gate so the full test surface (including the optional
        # sub-projects that skip without their extras) runs before we
        # publish to PyPI. A poisoned release is permanent (PyPI versions
        # can be yanked but not deleted), so the gate must be thorough.
        run: |
          uv sync --frozen --all-extras --python "$PYTHON_VERSION"
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Lint with ruff
        run: uv run --frozen ruff check src/ tests/ examples/ scripts/

      - name: Check formatting with ruff
        run: uv run --frozen ruff format --check src/ tests/ examples/ scripts/

      - name: Type-check with pyright
        run: uv run --frozen pyright --warnings

      - name: Audit frozen dependency graph
        run: |
          uv export --frozen --all-extras --all-groups --python "$PYTHON_VERSION" --no-emit-project --no-hashes --output-file frozen-requirements.txt
          uv run --frozen python -m pip_audit --requirement frozen-requirements.txt --progress-spinner off
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Run pytest
        env:
          NNX_TQDM_DISABLE: "1"
        run: uv run --frozen pytest

      - name: Build docs with mkdocs --strict
        run: |
          uv run --frozen python -m scripts.docs.extract_architecture_svg --check
          uv run --frozen python -m scripts.docs.build_docs
          uv run --frozen mkdocs build --strict --site-dir _site

  build-distributions:
    name: Build and verify sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        # actions/checkout@v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ inputs.release_ref || github.sha }}
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python@v7.0.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'

      - name: Install uv
        # astral-sh/setup-uv@v7.6.0
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: false
          version: "0.11.31"

      - name: Sync build tooling from the frozen lock
        run: uv sync --frozen --only-group release --no-install-project --no-build --python "3.11"

      - name: Assert tag matches pyproject version
        # PyPI uploads are permanent (yank-not-delete), so a typo'd tag
        # (v0.2.1 against a 0.2.0 pyproject) must abort BEFORE publish —
        # verify-published would only catch the mismatch after the
        # irreversible upload. workflow_dispatch dry-runs skip this.
        # Reusable workflows retain the caller's event name, so Release Please
        # calls are identified by their required tag_name input.
        if: inputs.tag_name != ''
        run: |
          tag_version="${RELEASE_TAG#v}"
          py_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag_version" != "$py_version" ]; then
            echo "::error::tag v$tag_version does not match pyproject version $py_version — aborting before publish."
            exit 1
          fi
        env:
          RELEASE_TAG: ${{ inputs.tag_name }}

      - name: Build reproducible sdist + wheel
        run: |
          set -euo pipefail
          epoch="$(git log -1 --pretty=%ct)"
          export SOURCE_DATE_EPOCH="$epoch"
          uv build --no-build-isolation --python .venv/bin/python --out-dir dist-a
          uv build --no-build-isolation --python .venv/bin/python --out-dir dist-b
          python scripts/normalize_sdist.py dist-a/*.tar.gz --epoch "$epoch"
          python scripts/normalize_sdist.py dist-b/*.tar.gz --epoch "$epoch"
          for artifact in dist-a/*; do
            name="$(basename "$artifact")"
            cmp "$artifact" "dist-b/$name"
          done
          mv dist-a dist
          rm -rf dist-b

      - name: Verify built distributions
        # twine check catches the most common metadata issues (missing
        # long_description, invalid RST/MD, malformed classifiers) before
        # uploading. Cheap pre-flight; failure here aborts the publish.
        run: uv run --frozen --no-sync twine check dist/*

      - name: Smoke-test wheel and sdist in clean environments
        run: |
          uv export --frozen --group release --no-emit-project --output-file smoke-requirements.txt
          index=0
          for artifact in dist/*.whl dist/*.tar.gz; do
            index=$((index + 1))
            venv="/tmp/nnx-artifact-smoke-$index"
            python -m venv "$venv"
            uv pip sync --python "$venv/bin/python" --require-hashes smoke-requirements.txt
            uv pip install --python "$venv/bin/python" --no-deps --no-build-isolation "$artifact"
            "$venv/bin/python" - <<'PY'
          import importlib.metadata
          import nnx

          assert importlib.metadata.version("thekaveh-nnx") == nnx.__version__
          files = importlib.metadata.files("thekaveh-nnx") or []
          assert any(str(path) == "nnx/py.typed" for path in files)
          PY
          done

      - name: Upload verified distributions
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-distributions
          path: dist/
          retention-days: 7
          overwrite: true

  publish-pypi:
    name: Publish verified distributions to PyPI
    needs: build-distributions
    if: inputs.tag_name != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/thekaveh-nnx
    permissions:
      id-token: write # Authenticate the trusted PyPI publisher; no long-lived token is stored.
      contents: read
    steps:
      - name: Download verified distributions
        # actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-distributions
          path: dist

      - name: Publish to PyPI
        # pypa/gh-action-pypi-publish@v1.14.1
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247
        with:
          skip-existing: true

  verify-published:
    name: Verify the new version is reachable on PyPI
    needs: publish-pypi
    # Only runs on Release Please publishes, not workflow_dispatch dry runs
    # (since the dry-run path skips the pypi-publish step).
    if: inputs.tag_name != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Least-privilege: this job only fetches from PyPI + imports nnx.
    # No GITHUB_TOKEN scopes beyond contents:read needed.
    permissions:
      contents: read
    steps:
      - name: Download verified distributions
        # actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-distributions
          path: dist

      - name: Extract version from tag
        id: ver
        run: |
          version="${RELEASE_TAG#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Verifying that thekaveh-nnx==$version is reachable on PyPI..."
        env:
          RELEASE_TAG: ${{ inputs.tag_name }}

      - name: Set up Python
        # No pip cache here — we want fresh resolution to catch PyPI
        # propagation lag honestly. Cache would defeat the purpose.
        # actions/setup-python@v7.0.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'

      - name: Wait for PyPI CDN propagation + install in a fresh venv
        # PyPI's CDN can lag by tens of seconds after a successful upload.
        # Retry up to 5 times with 30s backoff (~2.5min total budget).
        # Each attempt starts from a clean venv to ensure a partial
        # install on attempt N can't mask the regression on attempt N+1.
        run: |
          set -e
          version="$RELEASE_VERSION"
          for attempt in 1 2 3 4 5; do
            rm -rf .verify-venv
            python -m venv .verify-venv
            if .verify-venv/bin/python -m pip install --no-cache-dir "thekaveh-nnx==$version"; then
              echo "✓ pip install succeeded on attempt $attempt"
              exit_code=0
              break
            fi
            exit_code=1
            if [ "$attempt" -eq 5 ]; then
              echo "✗ pip install failed after 5 attempts; PyPI propagation timeout"
              exit 1
            fi
            echo "Attempt $attempt failed (PyPI CDN propagation lag?); waiting 30s..."
            sleep 30
          done
          exit "$exit_code"
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}

      - name: Import + version check
        run: |
          .verify-venv/bin/python - <<'PY'
          import os
          import nnx
          from nnx import ConvNN
          from nnx import FeedFwdMoENN
          from nnx import NNConvParams
          from nnx import NNMoEParams

          expected = os.environ["EXPECTED_VERSION"]
          actual = nnx.__version__
          assert actual == expected, (
              f"version mismatch: nnx.__version__={actual!r} "
              f"but tag was {expected!r}"
          )
          required_apis = (NNMoEParams, NNConvParams, FeedFwdMoENN, ConvNN)
          print(
              f"✓ thekaveh-nnx {actual} live on PyPI with Studio APIs: "
              + ", ".join(symbol.__name__ for symbol in required_apis)
          )
          PY
        env:
          EXPECTED_VERSION: ${{ steps.ver.outputs.version }}

      - name: Verify PyPI artifact hashes
        env:
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import urllib.request

          version = os.environ["RELEASE_VERSION"]
          with urllib.request.urlopen(f"https://pypi.org/pypi/thekaveh-nnx/{version}/json") as response:
              published = {
                  item["filename"]: item["digests"]["sha256"]
                  for item in json.load(response)["urls"]
              }
          local = {
              path.name: hashlib.sha256(path.read_bytes()).hexdigest()
              for path in pathlib.Path("dist").iterdir()
              if path.is_file()
          }
          assert local
          assert published == local, (
              f"PyPI artifact hashes differ: local={local}, published={published}"
          )
          PY

  publish-github-release:
    name: Publish verified GitHub release
    needs: [build-distributions, verify-published]
    if: inputs.tag_name != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write # Upload verified artifacts and publish the draft GitHub release.
    steps:
      - name: Checkout release commit
        # actions/checkout@v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ inputs.release_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag still identifies the release commit
        env:
          RELEASE_REF: ${{ inputs.release_ref }}
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          expected="$(git rev-parse "$RELEASE_REF^{commit}")"
          actual="$(git rev-parse "$RELEASE_TAG^{commit}")"
          if [ "$actual" != "$expected" ]; then
            echo "::error::tag $RELEASE_TAG resolves to $actual, expected release commit $expected"
            exit 1
          fi

      - name: Download verified distributions
        # actions/download-artifact@v8.0.1
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-distributions
          path: dist

      - name: Attach distributions or verify an already-published release
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          if [ "$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = false ]; then
            expected="$(find dist -maxdepth 1 -type f -exec basename {} \; | sort)"
            actual="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort)"
            if [ "$actual" != "$expected" ]; then
              echo "::error::published release assets differ from verified distributions"
              exit 1
            fi
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "already_published=false" >> "$GITHUB_OUTPUT"
          gh release upload "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber

      - name: Verify exact GitHub release asset hashes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import subprocess

          payload = json.loads(
              subprocess.check_output(
                  ["gh", "api", f"repos/{os.environ['GITHUB_REPOSITORY']}/releases/tags/{os.environ['RELEASE_TAG']}"]
              )
          )
          remote = {
              asset["name"]: (asset.get("digest") or "").removeprefix("sha256:")
              for asset in payload["assets"]
          }
          local = {
              path.name: hashlib.sha256(path.read_bytes()).hexdigest()
              for path in pathlib.Path("dist").iterdir()
              if path.is_file()
          }
          assert remote == local, f"GitHub release asset hashes differ: local={local}, remote={remote}"
          PY

      - name: Verify existing immutable release attestation
        if: steps.release_state.outputs.already_published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: gh release verify "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"

      - name: Publish Release Please draft
        if: steps.release_state.outputs.already_published != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false

      - name: Verify new immutable release attestation
        if: steps.release_state.outputs.already_published != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          for attempt in 1 2 3 4 5 6; do
            if gh release verify "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"; then
              exit 0
            fi
            [ "$attempt" -eq 6 ] && exit 1
            sleep 10
          done
