name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Gate: run the full test matrix before letting the publish job run.
  # Without this, a tag push on a red branch would still publish to PyPI
  # (versions can be yanked but not deleted — a poisoned release is
  # permanent).
  test:
    name: Test before release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (editable + dev + every optional extra)
        # Match ci.yml — every optional-dep extra is installed for the
        # release gate so the full test surface (including the optional
        # sub-projects that skip without their extras) runs before we
        # publish to PyPI. A poisoned release is permanent (PyPI versions
        # can be yanked but not deleted), so the gate must be thorough.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs,hub,viz,viz-interactive,quantize,onnx-dynamo,embeddings,lm,gguf-write]"

      - name: Lint with ruff
        run: ruff check src/ tests/ examples/

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/ examples/

      - name: Run pytest
        env:
          NNX_TQDM_DISABLE: "1"
        run: pytest

      - name: Build docs with mkdocs --strict
        run: mkdocs build --strict --site-dir _site

  build-and-publish:
    name: Build sdist + wheel and publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Scopes OIDC credentials to a configured GitHub deployment
    # environment named `pypi`. Configure required approvals + branch
    # protection on that environment via repo settings so a misconfigured
    # workflow on a fork or branch can't publish.
    environment:
      name: pypi
      url: https://pypi.org/p/thekaveh-nnx
    permissions:
      # OIDC-based PyPI trusted publishing (no API token in secrets needed).
      # Configure the project on PyPI > Manage > Publishing to opt in.
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify built distributions
        # twine check catches the most common metadata issues (missing
        # long_description, invalid RST/MD, malformed classifiers) before
        # uploading. Cheap pre-flight; failure here aborts the publish.
        run: twine check dist/*

      - name: Publish to PyPI
        # Only runs on tag pushes; workflow_dispatch builds without publishing
        # so you can inspect the artifacts before cutting a real release.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Upload build artifacts (workflow_dispatch dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  verify-published:
    name: Verify the new version is reachable on PyPI
    needs: build-and-publish
    # Only runs on actual tag-push publishes, not workflow_dispatch dry runs
    # (since the dry-run path skips the pypi-publish step).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Extract version from tag
        id: ver
        run: |
          version="${GITHUB_REF#refs/tags/v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Verifying that thekaveh-nnx==$version is reachable on PyPI..."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Wait for PyPI CDN propagation + install in a fresh venv
        # PyPI's CDN can lag by tens of seconds after a successful upload.
        # Retry up to 5 times with 30s backoff (~2.5min total budget).
        run: |
          set -e
          version="${{ steps.ver.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            python -m venv .verify-venv
            if .verify-venv/bin/python -m pip install --no-cache-dir "thekaveh-nnx==$version"; then
              echo "✓ pip install succeeded on attempt $attempt"
              exit_code=0
              break
            fi
            exit_code=1
            if [ "$attempt" -eq 5 ]; then
              echo "✗ pip install failed after 5 attempts; PyPI propagation timeout"
              exit 1
            fi
            echo "Attempt $attempt failed (PyPI CDN propagation lag?); waiting 30s..."
            rm -rf .verify-venv
            sleep 30
          done
          exit $exit_code

      - name: Import + version check
        run: |
          .verify-venv/bin/python - <<'PY'
          import os
          import nnx
          expected = os.environ["EXPECTED_VERSION"]
          actual = nnx.__version__
          assert actual == expected, (
              f"version mismatch: nnx.__version__={actual!r} "
              f"but tag was {expected!r}"
          )
          print(f"✓ thekaveh-nnx {actual} live on PyPI and importable as nnx")
          PY
        env:
          EXPECTED_VERSION: ${{ steps.ver.outputs.version }}
