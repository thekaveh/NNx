name: Release Please

# release-please watches main for Conventional Commits and maintains a
# long-lived "release PR" that bumps the version + updates CHANGELOG.md
# according to what's accumulated since the last tag. Merging that PR
# pushes a vX.Y.Z tag, which fires release.yml's tag-triggered publish
# job — so the human gate stays on the release PR merge, and the
# version-bump / CHANGELOG / tag are all mechanical from there.
on:
  push:
    branches: [main]

# release-please needs to push commits to its release branch and open
# PRs against main. Everything else stays read-only.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
