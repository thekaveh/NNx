name: Release Please

# release-please watches main for Conventional Commits and maintains a
# long-lived "release PR" that bumps the version + updates CHANGELOG.md
# according to what's accumulated since the last tag. Merging that PR
# creates a vX.Y.Z release. The publish job below calls the reusable
# release workflow in the same run because events created by GITHUB_TOKEN
# do not trigger ordinary push workflows.
on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # release-please pushes its release branch and opens or updates a PR.
    permissions:
      actions: write # Dispatch required checks for the managed release PR.
      contents: write # Push the managed release branch and tag.
      pull-requests: write # Open or update the managed release PR.
    steps:
      - name: Release Please
        id: release
        # googleapis/release-please-action@v5.0.0
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout repository for release lock refresh
        if: steps.release.outputs.prs_created == 'true'
        # actions/checkout@v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv for release lock refresh
        if: steps.release.outputs.prs_created == 'true'
        # astral-sh/setup-uv@v7.6.0
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          enable-cache: false
          version: "0.11.31"

      - name: Dispatch required checks for managed release PRs
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh auth setup-git
          gh pr list --repo "$GITHUB_REPOSITORY" --state open --author app/github-actions \
            --json headRefName --jq '.[].headRefName | select(startswith("release-please--"))' |
          while IFS= read -r branch; do
            [ -n "$branch" ] || continue
            git fetch origin "$branch"
            git checkout --detach "origin/$branch"
            uv lock
            if ! git diff --quiet -- uv.lock; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add uv.lock
              git commit -m "chore: refresh release lockfile"
              git push origin "HEAD:$branch"
            fi
            gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"
            gh workflow run security.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"
          done

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_ref: ${{ steps.release.outputs.sha }}
      tag_name: ${{ steps.release.outputs.tag_name }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      release_ref: ${{ needs.release-please.outputs.release_ref }}
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write # Publish the verified draft GitHub release.
      id-token: write # Forwarded to the reusable trusted-publishing job.
