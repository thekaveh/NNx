name: Release Please

# release-please watches main for Conventional Commits and maintains a
# long-lived "release PR" that bumps the version + updates CHANGELOG.md
# according to what's accumulated since the last tag. Merging that PR
# creates a vX.Y.Z release. The publish job below calls the reusable
# release workflow in the same run because events created by GITHUB_TOKEN
# do not trigger a second workflow. Direct tag pushes remain supported.
on:
  push:
    branches: [main]

# release-please needs to push commits to its release branch and open
# PRs against main. Everything else stays read-only.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Release Please
        id: release
        # googleapis/release-please-action@v4
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_ref: ${{ steps.release.outputs.sha }}
      tag_name: ${{ steps.release.outputs.tag_name }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      release_ref: ${{ needs.release-please.outputs.release_ref }}
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: read
      id-token: write
