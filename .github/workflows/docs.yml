name: docs

on:
  push:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "README.md"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "examples/README.md"
      - "tests/README.md"
      - "scripts/docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "README.md"
      - "SECURITY.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "examples/README.md"
      - "tests/README.md"
      - "scripts/docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python@v7.0.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"
      - name: Install docs + feature extras
        run: |
          python -m pip install -r requirements-tools.txt
          uv sync --frozen --all-extras --python "3.12"
      - name: Build site (strict)
        run: |
          uv run --frozen python -m scripts.docs.extract_architecture_svg --check
          uv run --frozen mkdocs build --strict

      - name: Verify deterministic wiki projection
        run: uv run --frozen python -m scripts.docs.build_wiki --check

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # actions/configure-pages@v6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # actions/upload-pages-artifact@v5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # Publish the uploaded artifact to GitHub Pages.
      id-token: write # Authenticate the Pages deployment.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy Pages
        # actions/deploy-pages@v5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128

  wiki:
    name: Publish GitHub wiki
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Push the generated wiki through GITHUB_TOKEN.
    steps:
      - name: Checkout
        # actions/checkout@v7.0.1
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python@v7.0.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Install documentation tooling
        run: |
          python -m pip install -r requirements-tools.txt
          uv sync --frozen --all-extras --python "3.12"

      - name: Build wiki
        run: uv run --frozen python -m scripts.docs.build_wiki

      - name: Publish wiki master branch
        env:
          WIKI_REPOSITORY: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: uv run --frozen python -m scripts.docs.push_wiki generated/wiki "$WIKI_REPOSITORY"
