name: docs

on:
  push:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "examples/README.md"
      - "tests/README.md"
      - "scripts/docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "examples/README.md"
      - "tests/README.md"
      - "scripts/docs/**"
      - "mkdocs.yml"
      - "src/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Install docs + feature extras
        run: |
          python -m pip install -r requirements-tools.txt
          uv sync --frozen --all-extras --python "3.12"
      - name: Build site (strict)
        run: uv run --frozen mkdocs build --strict

      - name: Verify deterministic wiki projection
        run: uv run --frozen python -m scripts.docs.build_wiki --check

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # actions/configure-pages@v5
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
        with:
          enablement: true

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # actions/upload-pages-artifact@v3
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy Pages
        # actions/deploy-pages@v4
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128

  wiki:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        # actions/checkout@v5
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # actions/setup-python@v6
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install documentation tooling
        run: |
          python -m pip install -r requirements-tools.txt
          uv sync --frozen --all-extras --python "3.12"

      - name: Build wiki
        run: uv run --frozen python -m scripts.docs.build_wiki

      - name: Publish wiki master branch
        env:
          WIKI_REPOSITORY: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: uv run --frozen python -m scripts.docs.push_wiki generated/wiki "$WIKI_REPOSITORY"
