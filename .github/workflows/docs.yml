name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # mkdocs gh-deploy commits to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gh-deploy needs full history for gh-pages branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install nnx + docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build docs (verify)
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        run: mkdocs gh-deploy --force
